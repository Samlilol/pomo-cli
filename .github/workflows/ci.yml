name: CI

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[mcp]"
      - run: python -m unittest -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Inspect package contents
        run: |
          python - <<'PY'
          import sys
          import tarfile
          import zipfile
          from pathlib import Path

          disallowed = (".git/", ".venv/", "__pycache__/", "build/", "dist/")
          archives = list(Path("dist").glob("*.tar.gz")) + list(Path("dist").glob("*.whl"))
          if not archives:
              raise SystemExit("no distribution archives were built")

          def check(names, label):
              bad = [name for name in names if any(token in name for token in disallowed)]
              if bad:
                  raise SystemExit(f"{label} contains disallowed entries: {bad}")

          for archive in archives:
              if archive.suffix == ".whl":
                  with zipfile.ZipFile(archive) as wheel:
                      check(wheel.namelist(), archive.name)
              else:
                  with tarfile.open(archive) as sdist:
                      check(sdist.getnames(), archive.name)
          PY
      - name: Base install smoke test
        run: |
          python -m venv /tmp/pomo-base
          /tmp/pomo-base/bin/pip install dist/*.whl
          /tmp/pomo-base/bin/pomo --help >/tmp/pomo-help.txt
          set +e
          /tmp/pomo-base/bin/pomo-mcp 2>/tmp/pomo-mcp-base.err
          status=$?
          set -e
          test "$status" -eq 1
          grep -Fx "Install pomo-cli[mcp] to use the MCP server." /tmp/pomo-mcp-base.err
      - name: MCP extra smoke test
        run: |
          python -m venv /tmp/pomo-mcp
          wheel_uri=$(python - <<'PY'
          from pathlib import Path
          wheel = next(Path("dist").glob("*.whl"))
          print(wheel.resolve().as_uri())
          PY
          )
          /tmp/pomo-mcp/bin/pip install "pomo-cli[mcp] @ ${wheel_uri}"
          timeout 5s bash -lc 'exec /tmp/pomo-mcp/bin/pomo-mcp < /dev/null'
